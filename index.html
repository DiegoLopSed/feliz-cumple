<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <title>Para Sari 💖</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
      :root {
        --rosa: #e91e63;
        --rosa-claro: #fce4ec;
        --rosa-fondo: #fff5f8;
      }

      body {
        font-family: "Poppins", sans-serif;
        background: linear-gradient(160deg, #fff5f8 0%, #ffffff 50%, #fce4ec 100%);
        min-height: 100vh;
        color: #333;
      }

      .titulo-pagina {
        font-family: "Pacifico", cursive;
        font-size: clamp(2rem, 5vw, 2.75rem);
        color: var(--rosa);
        text-align: center;
        padding: 1.5rem 0;
      }

      .subtitulo {
        text-align: center;
        color: #666;
        font-size: 1rem;
        margin-bottom: 2rem;
      }

      .panel {
        border-radius: 1rem;
        border: 1px solid rgba(233, 30, 99, 0.15);
        background: rgba(255, 255, 255, 0.9);
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.06);
      }

      .panel-titulo {
        font-family: "Pacifico", cursive;
        font-size: 1.35rem;
        color: var(--rosa);
        margin-bottom: 1rem;
      }

      .mensaje-card {
        border-radius: 0.75rem;
        border: 1px solid rgba(233, 30, 99, 0.12);
        background: linear-gradient(135deg, #ffffff, #fffafc);
        padding: 1rem 1.25rem;
        margin-bottom: 0.75rem;
      }

      .mensaje-autor {
        font-weight: 600;
        color: var(--rosa);
        font-size: 0.95rem;
      }

      .mensaje-texto {
        margin: 0.35rem 0 0;
        font-size: 0.95rem;
        line-height: 1.5;
        color: #444;
      }

      .mensaje-fecha {
        font-size: 0.7rem;
        color: #999;
        margin-top: 0.25rem;
      }

      .lista-mensajes {
        max-height: 420px;
        overflow-y: auto;
      }

      .lista-mensajes::-webkit-scrollbar {
        width: 6px;
      }

      .lista-mensajes::-webkit-scrollbar-thumb {
        background: rgba(233, 30, 99, 0.3);
        border-radius: 3px;
      }

      .vacio {
        text-align: center;
        padding: 2rem 1rem;
        color: #999;
        font-size: 0.95rem;
      }

      .btn-enviar {
        background: var(--rosa);
        border: none;
        border-radius: 0.6rem;
      }

      .btn-enviar:hover {
        background: #c2185b;
      }

      .form-control, .form-control:focus {
        border-radius: 0.6rem;
        border-color: rgba(233, 30, 99, 0.2);
      }

      .form-control:focus {
        box-shadow: 0 0 0 3px rgba(233, 30, 99, 0.1);
      }

      footer {
        text-align: center;
        padding: 1.5rem;
        color: #888;
        font-size: 0.85rem;
      }
    </style>
  </head>
  <body>
    <div class="container py-3 py-md-4">
      <h1 class="titulo-pagina">Para Sari 💖</h1>
      <p class="subtitulo">Un espacio para que quienes te quieren te dejen un mensaje</p>

      <div class="row g-4">
        <!-- Panel: Escribir felicitación -->
        <div class="col-lg-5">
          <div class="panel p-4">
            <h2 class="panel-titulo">Escribe tu felicitación</h2>
            <p class="text-muted small mb-3">Tu nombre y un mensaje bonito para Sari.</p>
            <form id="form-felicitacion">
              <div class="mb-3">
                <label for="nombre" class="form-label">Tu nombre</label>
                <input type="text" id="nombre" class="form-control" placeholder="Ej: María, Los del trabajo..." required>
              </div>
              <div class="mb-3">
                <label for="mensaje" class="form-label">Tu mensaje para Sari</label>
                <textarea id="mensaje" class="form-control" rows="4" maxlength="600" placeholder="Escribe aquí lo que quieras decirle..." required></textarea>
                <div class="form-text">Máximo 600 caracteres</div>
              </div>
              <button type="submit" class="btn btn-enviar btn-primary w-100">Enviar felicitación</button>
              <p id="aviso-envio" class="small mt-2 text-success d-none">¡Listo! Tu mensaje ya está en el panel de abajo.</p>
            </form>
          </div>
        </div>

        <!-- Panel: Ver felicitaciones -->
        <div class="col-lg-7">
          <div class="panel p-4">
            <h2 class="panel-titulo">Felicitaciones para Sari</h2>
            <div id="lista-mensajes" class="lista-mensajes">
              <!-- Se llenan con JS -->
            </div>
          </div>
        </div>
      </div>

      <footer>Hecho con cariño para Sari 💖</footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      const CLAVE = "felicitacionesSari";

      function cargar() {
        try {
          const s = localStorage.getItem(CLAVE);
          if (!s) return [];
          const arr = JSON.parse(s);
          return Array.isArray(arr) ? arr : [];
        } catch (e) {
          return [];
        }
      }

      function guardar(lista) {
        try {
          localStorage.setItem(CLAVE, JSON.stringify(lista));
        } catch (e) {}
      }

      function fechaLindo(iso) {
        try {
          return new Date(iso).toLocaleDateString("es", {
            day: "numeric", month: "short", year: "numeric",
            hour: "2-digit", minute: "2-digit"
          });
        } catch (e) {
          return "";
        }
      }

      function escapar(str) {
        const div = document.createElement("div");
        div.textContent = str;
        return div.innerHTML;
      }

      function pintar(lista) {
        const el = document.getElementById("lista-mensajes");
        if (lista.length === 0) {
          el.innerHTML = '<div class="vacio">Aún no hay mensajes. ¡Sé el primero en dejarle una felicitación a Sari!</div>';
          return;
        }
        const ordenados = [...lista].reverse();
        el.innerHTML = ordenados.map(function (m) {
          const texto = escapar(m.texto).replace(/\n/g, "<br>");
          const nombre = escapar(m.nombre);
          const fecha = fechaLindo(m.fecha);
          return (
            '<div class="mensaje-card">' +
              '<div class="mensaje-autor">' + nombre + '</div>' +
              '<div class="mensaje-texto">' + texto + '</div>' +
              '<div class="mensaje-fecha">' + fecha + '</div>' +
            '</div>'
          );
        }).join("");
      }

      var mensajes = cargar();
      pintar(mensajes);

      document.getElementById("form-felicitacion").addEventListener("submit", function (e) {
        e.preventDefault();
        var nombre = document.getElementById("nombre").value.trim();
        var texto = document.getElementById("mensaje").value.trim();
        if (!nombre || !texto) return;

        mensajes.push({
          nombre: nombre,
          texto: texto,
          fecha: new Date().toISOString()
        });
        guardar(mensajes);
        pintar(mensajes);

        this.reset();
        var aviso = document.getElementById("aviso-envio");
        aviso.classList.remove("d-none");
        setTimeout(function () { aviso.classList.add("d-none"); }, 3000);

        document.getElementById("lista-mensajes").scrollIntoView({ behavior: "smooth", block: "start" });
      });
    </script>
  </body>
</html>
