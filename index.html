<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <title>Para Sari 💖</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
      :root {
        --rosa: #e91e63;
        --rosa-claro: #fce4ec;
        --rosa-fondo: #fff5f8;
      }

      body {
        font-family: "Poppins", sans-serif;
        background: linear-gradient(160deg, #fff5f8 0%, #ffffff 50%, #fce4ec 100%);
        min-height: 100vh;
        color: #333;
      }

      .titulo-pagina {
        font-family: "Pacifico", cursive;
        font-size: clamp(2rem, 5vw, 2.75rem);
        color: var(--rosa);
        text-align: center;
        padding: 1.5rem 0;
      }

      .subtitulo {
        text-align: center;
        color: #666;
        font-size: 1rem;
        margin-bottom: 2rem;
      }

      .panel {
        border-radius: 1rem;
        border: 1px solid rgba(233, 30, 99, 0.15);
        background: rgba(255, 255, 255, 0.9);
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.06);
      }

      .panel-titulo {
        font-family: "Pacifico", cursive;
        font-size: 1.35rem;
        color: var(--rosa);
        margin-bottom: 1rem;
      }

      .mensaje-card {
        border-radius: 0.75rem;
        border: 1px solid rgba(233, 30, 99, 0.12);
        background: linear-gradient(135deg, #ffffff, #fffafc);
        padding: 1rem 1.25rem;
        margin-bottom: 0.75rem;
      }

      .mensaje-autor {
        font-weight: 600;
        color: var(--rosa);
        font-size: 0.95rem;
      }

      .mensaje-texto {
        margin: 0.35rem 0 0;
        font-size: 0.95rem;
        line-height: 1.5;
        color: #444;
      }

      .mensaje-fecha {
        font-size: 0.7rem;
        color: #999;
        margin-top: 0.25rem;
      }

      .lista-mensajes {
        max-height: 420px;
        overflow-y: auto;
      }

      .lista-mensajes::-webkit-scrollbar {
        width: 6px;
      }

      .lista-mensajes::-webkit-scrollbar-thumb {
        background: rgba(233, 30, 99, 0.3);
        border-radius: 3px;
      }

      .vacio {
        text-align: center;
        padding: 2rem 1rem;
        color: #999;
        font-size: 0.95rem;
      }

      .btn-enviar {
        background: var(--rosa);
        border: none;
        border-radius: 0.6rem;
      }

      .btn-enviar:hover {
        background: #c2185b;
      }

      .form-control, .form-control:focus {
        border-radius: 0.6rem;
        border-color: rgba(233, 30, 99, 0.2);
      }

      .form-control:focus {
        box-shadow: 0 0 0 3px rgba(233, 30, 99, 0.1);
      }

      footer {
        text-align: center;
        padding: 1.5rem;
        color: #888;
        font-size: 0.85rem;
      }
    </style>
  </head>
  <body>
    <div class="container py-3 py-md-4">
      <h1 class="titulo-pagina">Para Sari 💖</h1>
      <p class="subtitulo">Un espacio para que quienes te quieren te dejen un mensaje</p>

      <div class="row g-4">
        <!-- Panel: Escribir felicitación -->
        <div class="col-lg-5">
          <div class="panel p-4">
            <h2 class="panel-titulo">Escribe tu felicitación</h2>
            <p class="text-muted small mb-3">Tu nombre y un mensaje bonito para Sari.</p>
            <form id="form-felicitacion">
              <div class="mb-3">
                <label for="nombre" class="form-label">Tu nombre</label>
                <input type="text" id="nombre" class="form-control" placeholder="Ej: María, Los del trabajo..." required>
              </div>
              <div class="mb-3">
                <label for="mensaje" class="form-label">Tu mensaje para Sari</label>
                <textarea id="mensaje" class="form-control" rows="4" maxlength="600" placeholder="Escribe aquí lo que quieras decirle..." required></textarea>
                <div class="form-text">Máximo 600 caracteres</div>
              </div>
              <button type="submit" class="btn btn-enviar btn-primary w-100">Enviar felicitación</button>
              <p id="aviso-envio" class="small mt-2 text-success d-none">¡Listo! Tu mensaje ya está en el panel de abajo.</p>
            </form>
          </div>
        </div>

        <!-- Panel: Ver felicitaciones -->
        <div class="col-lg-7">
          <div class="panel p-4">
            <h2 class="panel-titulo">Felicitaciones para Sari</h2>
            <div id="lista-mensajes" class="lista-mensajes">
              <!-- Se llenan con JS -->
            </div>
          </div>
        </div>
      </div>

      <footer>Hecho con cariño para Sari 💖</footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
      // ========== CONFIGURACIÓN JSON (para que todos vean los mismos mensajes) ==========
      // Opción A: Usar JSONBin.io (gratis). Crea cuenta en https://jsonbin.io,
      // crea un "bin", pega dentro: { "mensajes": [] }
      // Luego pon aquí el ID del bin y tu Access Key (en API Keys).
      const JSONBIN_BIN_ID = "";
      const JSONBIN_ACCESS_KEY = "";

      // Si no usas JSONBin, la página carga desde mensajes.json y guarda en localStorage
      // (solo en ese navegador). Con JSONBin, carga y guarda en la nube para todos.

      const CLAVE_LOCAL = "felicitacionesSari";

      // Fallback cuando no hay mensajes.json ni JSONBin
      const mensajesFallback = [
        { nombre: "Para Sari", texto: "Aún no hay mensajes. ¡Deja el primero!", fecha: new Date().toISOString() }
      ];

      function fechaLindo(iso) {
        try {
          return new Date(iso).toLocaleDateString("es", {
            day: "numeric", month: "short", year: "numeric",
            hour: "2-digit", minute: "2-digit"
          });
        } catch (e) { return ""; }
      }

      function escapar(str) {
        const div = document.createElement("div");
        div.textContent = str;
        return div.innerHTML;
      }

      function pintar(lista) {
        const el = document.getElementById("lista-mensajes");
        if (!lista || lista.length === 0) {
          el.innerHTML = '<div class="vacio">Aún no hay mensajes. ¡Sé el primero en dejarle una felicitación a Sari!</div>';
          return;
        }
        const ordenados = [...lista].reverse();
        el.innerHTML = ordenados.map(function (m) {
          const texto = escapar(m.texto || "").replace(/\n/g, "<br>");
          const nombre = escapar(m.nombre || "Alguien que te quiere");
          const fecha = m.fecha ? fechaLindo(m.fecha) : "";
          return '<div class="mensaje-card">' +
            '<div class="mensaje-autor">' + nombre + '</div>' +
            '<div class="mensaje-texto">' + texto + '</div>' +
            '<div class="mensaje-fecha">' + fecha + '</div>' +
            '</div>';
        }).join("");
      }

      function cargarDesdeJson() {
        return fetch("mensajes.json")
          .then(function (r) { return r.ok ? r.json() : Promise.reject(); })
          .then(function (arr) { return Array.isArray(arr) ? arr : []; })
          .catch(function () { return null; });
      }

      function cargarDesdeJSONBin() {
        if (!JSONBIN_BIN_ID || !JSONBIN_ACCESS_KEY) return Promise.resolve(null);
        return fetch("https://api.jsonbin.io/v3/b/" + JSONBIN_BIN_ID + "/latest", {
          headers: { "X-Access-Key": JSONBIN_ACCESS_KEY }
        })
          .then(function (r) { return r.ok ? r.json() : Promise.reject(); })
          .then(function (data) {
            const arr = data.record && data.record.mensajes;
            return Array.isArray(arr) ? arr : [];
          })
          .catch(function () { return null; });
      }

      function guardarEnJSONBin(lista) {
        if (!JSONBIN_BIN_ID || !JSONBIN_ACCESS_KEY) return Promise.reject(new Error("No configurado"));
        return fetch("https://api.jsonbin.io/v3/b/" + JSONBIN_BIN_ID, {
          method: "PUT",
          headers: {
            "Content-Type": "application/json",
            "X-Access-Key": JSONBIN_ACCESS_KEY
          },
          body: JSON.stringify({ mensajes: lista })
        }).then(function (r) { if (!r.ok) throw new Error("Error al guardar"); });
      }

      function guardarEnLocal(lista) {
        try { localStorage.setItem(CLAVE_LOCAL, JSON.stringify(lista)); } catch (e) {}
      }

      function cargarDesdeLocal() {
        try {
          const s = localStorage.getItem(CLAVE_LOCAL);
          if (!s) return [];
          const arr = JSON.parse(s);
          return Array.isArray(arr) ? arr : [];
        } catch (e) { return []; }
      }

      let mensajes = [];

      function aplicarMensajes(lista) {
        mensajes = Array.isArray(lista) && lista.length ? lista : mensajesFallback;
        pintar(mensajes);
      }

      // Cargar: primero JSONBin, si no hay config entonces mensajes.json, si falla mezclar mensajes.json + localStorage
      (function iniciar() {
        if (JSONBIN_BIN_ID && JSONBIN_ACCESS_KEY) {
          cargarDesdeJSONBin().then(function (arr) {
            if (arr && arr.length) aplicarMensajes(arr);
            else cargarDesdeJson().then(function (arr) {
              aplicarMensajes(arr && arr.length ? arr : mensajesFallback);
            });
          });
          return;
        }
        cargarDesdeJson().then(function (arr) {
          const delJson = arr && arr.length ? arr : [];
          const delLocal = cargarDesdeLocal();
          // Si ya hay algo guardado en este navegador, usamos eso (lista completa). Si no, usamos mensajes.json
          const lista = delLocal.length > 0 ? delLocal : delJson;
          aplicarMensajes(lista.length ? lista : mensajesFallback);
        }).catch(function () {
          const delLocal = cargarDesdeLocal();
          aplicarMensajes(delLocal.length ? delLocal : mensajesFallback);
        });
      })();

      document.getElementById("form-felicitacion").addEventListener("submit", function (e) {
        e.preventDefault();
        const nombre = document.getElementById("nombre").value.trim();
        const texto = document.getElementById("mensaje").value.trim();
        if (!nombre || !texto) return;

        const nuevo = { nombre: nombre, texto: texto, fecha: new Date().toISOString() };
        mensajes.push(nuevo);
        pintar(mensajes);

        const aviso = document.getElementById("aviso-envio");
        const btn = this.querySelector('button[type="submit"]');

        if (JSONBIN_BIN_ID && JSONBIN_ACCESS_KEY) {
          btn.disabled = true;
          guardarEnJSONBin(mensajes).then(function () {
            this.reset();
            aviso.classList.remove("d-none");
            setTimeout(function () { aviso.classList.add("d-none"); }, 3000);
            document.getElementById("lista-mensajes").scrollIntoView({ behavior: "smooth", block: "start" });
          }.bind(this)).catch(function () {
            aviso.textContent = "No se pudo guardar en la nube. Revisa JSONBin.";
            aviso.classList.remove("d-none", "text-success");
            aviso.classList.add("text-warning");
          }).finally(function () { btn.disabled = false; });
        } else {
          guardarEnLocal(mensajes);
          this.reset();
          aviso.classList.remove("d-none");
          aviso.classList.add("text-success");
          aviso.textContent = "¡Listo! Tu mensaje está guardado (en este navegador).";
          setTimeout(function () { aviso.classList.add("d-none"); }, 3000);
          document.getElementById("lista-mensajes").scrollIntoView({ behavior: "smooth", block: "start" });
        }
      });
    </script>
  </body>
</html>
